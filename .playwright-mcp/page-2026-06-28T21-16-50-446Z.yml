        - generic [ref=e128]: Four Principles for Evaluating Any AI Partner
        - heading "How do you know if AI is actually working in your organization?" [level=2] [ref=e129]
        - paragraph [ref=e130]:
          - text: Most biopharma L&D leaders can't answer that question with confidence because the data that matters isn't in the dashboard.
          - text: These four principles are how Proxa Labs diagnoses whether AI is actually delivering, and how our practitioners have built 25 years of award-winning work around them.
      - generic [ref=e131]:
        - generic [ref=e132]:
          - img [ref=e134]
          - generic [ref=e137]: 01 — Methodology
          - generic [ref=e138]: We diagnose before we prescribe.
          - generic [ref=e139]: "Every engagement starts with the question your organization actually needs answered: what will determine whether any AI implementation succeeds or fails here? Most vendors skip this. We never do."
        - generic [ref=e140]:
          - img [ref=e142]
          - generic [ref=e145]: 02 — Compliance
          - generic [ref=e146]: Their compliance story is a retrofit. Ours is not.
          - generic [ref=e147]: MLR review, GxP validation, and compressed launch windows are the operating conditions Proxa Labs was designed around from day one.
        - generic [ref=e148]:
          - img [ref=e150]
          - generic [ref=e153]: 03 — Insider
          - generic [ref=e154]: We don't need you to explain pharma to us.
          - generic [ref=e155]: Proxa Labs' practitioners have operated inside the environments they now advise. The failure modes are already known. That's 25 years of practitioner experience, not a talking point.
        - generic [ref=e156]:
          - img [ref=e158]
          - generic [ref=e160]: 04 — Experiment
          - generic [ref=e161]: You don't commit until you have evidence.
          - generic [ref=e162]: Proxa Labs' model inverts the typical vendor sequence. We run structured experiments to test fit in your environment before you stake your credibility on it.
